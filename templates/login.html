<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --primary: {{ theme.primary }};
            --secondary: {{ theme.secondary }};
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="heart-icon">❤️</div>
            <h1>{{ site_title }}</h1>
            <p class="subtitle">Masukkan PIN untuk masuk</p>
            
            <div class="pin-display" id="pinDisplay">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            
            <input type="hidden" id="pinInput">
            
            <div class="keypad">
                {% for n in [1,2,3,4,5,6,7,8,9,'del',0,'ok'] %}
                <button class="key" data-value="{{ n }}">{% if n == 'del' %}⌫{% elif n == 'ok' %}➜{% else %}{{ n }}{% endif %}</button>
                {% endfor %}
            </div>
        </div>
    </div>
    
    <script>
        let pin = '';
        const maxLength = 6;
        
        function updatePinDisplay() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('filled', index < pin.length);
            });
            document.getElementById('pinInput').value = pin;
        }
        
        function shakeInput() {
            const display = document.getElementById('pinDisplay');
            display.classList.add('shake');
            setTimeout(() => {
                display.classList.remove('shake');
                pin = '';
                updatePinDisplay();
            }, 500);
        }
        
        function submitPin() {
            if (pin.length === maxLength) {
                fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'pin=' + pin
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/home';
                    } else {
                        shakeInput();
                    }
                });
            }
        }
        
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('click', () => {
                const value = key.dataset.value;
                if (value === 'del') {
                    pin = pin.slice(0, -1);
                } else if (value === 'ok') {
                    submitPin();
                } else if (pin.length < maxLength) {
                    pin += value;
                }
                updatePinDisplay();
            });
        });
    </script>
</body>
</html>
